name: CI & Deploy

permissions:
    contents: read

on:
    push:
        branches: ['master']
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - uses: actions/checkout@v6

            - name: Setup mise-en-place
              uses: jdx/mise-action@v3

            - name: Cache dependencies + astro
              uses: actions/cache@v5
              with:
                  path: |
                      node_modules
                      ~/.mise/cache
                      .astro
                      node_modules/.astro
                  key: ${{ runner.os }}-build-${{ hashFiles('**/.lock') }}-${{ hashFiles('src/**') }}
                  restore-keys: |
                      ${{ runner.os }}-build-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check Using biomejs
              run: biome ci

            - name: Run Tests
              run: bun run test

            - name: Build Project
              run: bun run build

            - name: Deploy Worker
              if: github.ref == 'refs/heads/master' && success()
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  packageManager: bun
