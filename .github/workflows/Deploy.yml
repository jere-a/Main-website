name: CI & Deploy

permissions:
  contents: read

on:
  push:
    branches: ["master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ vars.PUBLIC_CLOUDINARY_CLOUD_NAME }}

    steps:
      - uses: actions/checkout@v7.0.1

      - name: Setup mise-en-place
        uses: jdx/mise-action@v4

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: mise run test

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ vars.PUBLIC_CLOUDINARY_CLOUD_NAME }}

    steps:
      - uses: actions/checkout@v7.0.1

      - name: Setup mise-en-place
        uses: jdx/mise-action@v4

      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
